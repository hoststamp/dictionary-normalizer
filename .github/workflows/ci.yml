name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy src
      - run: coverage run -m pytest tests
      - run: coverage report
      - run: |
          generated="$(python -c 'import json; print(json.load(open("output/artifact.json"))["generated"])')"
          dictionary-normalizer --input input --output output/artifact.json --generated "$generated"
          git diff --exit-code -- output/artifact.json
      - run: dictionary-normalizer --validate output/artifact.json
