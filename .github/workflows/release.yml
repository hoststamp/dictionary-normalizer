name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.2.0
        required: true
        type: string
      dry_run:
        description: Prepare and verify without committing, tagging, or creating a GitHub release
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Check release branch
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "release publishing must run from main, got ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - run: python -m pip install -e ".[dev]"

      - name: Verify release files
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: python scripts/prepare-release.py "$RELEASE_VERSION"

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          version="$(python - <<'PY'
          import re
          import sys
          import tomllib

          with open("pyproject.toml", "rb") as pyproject:
              version = tomllib.load(pyproject)["project"]["version"]

          if re.fullmatch(r"(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)", version) is None:
              print("pyproject.toml: project version must be a three-part release version like 0.2.0", file=sys.stderr)
              sys.exit(1)

          print(version)
          PY
          )"
          if git rev-parse --verify --quiet "refs/tags/v$version" >/dev/null; then
            echo "tag v$version already exists" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - run: ruff check .
      - run: ruff format --check .
      - run: mypy src
      - run: coverage run -m pytest tests
      - run: coverage report
      - run: dictionary-normalizer --validate output/artifact.json
      - name: Verify release files are committed
        run: git diff --exit-code -- pyproject.toml src/dictionary_normalizer/__init__.py output/artifact.json

      - name: Build package
        run: |
          python -m pip install build==1.5.0
          python -m build

      - name: Tag release
        if: ${{ !inputs.dry_run }}
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          major="${RELEASE_VERSION%%.*}"
          minor="${RELEASE_VERSION%.*}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$RELEASE_VERSION" -m "Release v$RELEASE_VERSION"
          git tag -f "v$major"
          git tag -f "v$minor"
          git push origin "v$RELEASE_VERSION"
          git push --force origin "refs/tags/v$major" "refs/tags/v$minor"

      - name: Create GitHub release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "v$RELEASE_VERSION" \
            dist/* \
            output/artifact.json \
            --title "v$RELEASE_VERSION" \
            --notes "Release v$RELEASE_VERSION"

      - name: Show dry-run diff
        if: ${{ inputs.dry_run }}
        run: git diff -- pyproject.toml src/dictionary_normalizer/__init__.py output/artifact.json
